# Test configuration uses an in-memory H2 database so tests do not require PostgreSQL.
spring.datasource.url=jdbc:h2:mem:taskdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
management.endpoints.web.exposure.include=health
app.security.bootstrap.username=test-user
app.security.bootstrap.password=test-password-123
app.security.bootstrap.role=ADMIN
app.security.jwt.secret=test-secret-key-that-is-long-enough-12345
app.security.jwt.access-expiration=PT15M
app.security.jwt.refresh-expiration=P7D
app.security.rate-limit.max-attempts=5
app.security.rate-limit.window=PT15M
app.security.rate-limit.block-duration=PT15M
