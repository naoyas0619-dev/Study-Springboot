# Application name shown in logs and Spring context information.
spring.application.name=task-api

# Database connection settings.
# Values can be overridden from environment variables.
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/taskdb}
spring.datasource.username=${DB_USERNAME:app}
spring.datasource.password=${DB_PASSWORD:change-me}

# JPA / Hibernate settings.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Public actuator exposure used by health checks.
management.endpoints.web.exposure.include=health

# Authentication settings. These must be supplied from the environment or deployment config.
app.security.bootstrap.username=${APP_SECURITY_USERNAME}
app.security.bootstrap.password=${APP_SECURITY_PASSWORD}
app.security.bootstrap.role=${APP_SECURITY_ROLE:ADMIN}
app.security.jwt.secret=${JWT_SECRET}
app.security.jwt.access-expiration=${JWT_ACCESS_EXPIRATION:PT15M}
app.security.jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:P7D}
app.security.rate-limit.max-attempts=${AUTH_RATE_LIMIT_MAX_ATTEMPTS:5}
app.security.rate-limit.window=${AUTH_RATE_LIMIT_WINDOW:PT15M}
app.security.rate-limit.block-duration=${AUTH_RATE_LIMIT_BLOCK_DURATION:PT15M}
