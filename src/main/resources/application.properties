# Application name shown in logs and Spring context information.
spring.application.name=task-api

# Database connection settings.
# Values can be overridden from environment variables.
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/taskdb}
spring.datasource.username=${DB_USERNAME:app}
spring.datasource.password=${DB_PASSWORD:change-me}

# JPA / Hibernate settings.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
